<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covenant Bio Labs</title>
  <meta name="description" content="Covenant Bio Labs research catalog. Research use only." />

  <style>
    :root {
      --bg: #03060b;
      --bg2: #08111b;
      --panel: rgba(8, 12, 22, 0.84);
      --line: rgba(103, 182, 255, 0.22);
      --lineStrong: rgba(103, 213, 255, 0.46);
      --blue: #2b7dff;
      --blue2: #67d5ff;
      --green: #65df87;
      --gold: #f5d76e;
      --text: #eaf1ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.52);
      --radius: 28px;
      --max: 1440px;
      --btnGrad: linear-gradient(180deg, #8beaff, #58d8ff 42%, #55c9ff 100%);
      --verifiedGrad: linear-gradient(135deg, #fff3a6 0%, #65df87 55%, #5fd7ff 100%);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(43, 125, 255, 0.14), transparent 22%),
        radial-gradient(circle at 88% 12%, rgba(103, 213, 255, 0.10), transparent 18%),
        radial-gradient(circle at 50% 90%, rgba(101, 223, 135, 0.07), transparent 25%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      overflow-x: hidden;
      min-height: 100vh;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      font: inherit;
    }

    .molecule-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      opacity: 0.44;
    }

    .molecule {
      position: absolute;
      animation: floatDrift linear infinite;
      filter: drop-shadow(0 0 10px rgba(103, 213, 255, 0.18));
    }

    .molecule .node {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #8ddfff 35%, #2b7dff 80%);
      box-shadow: 0 0 10px rgba(103, 213, 255, 0.4);
      animation: pulseNode 4s ease-in-out infinite;
    }

    .molecule .bond {
      position: absolute;
      height: 2px;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(103, 213, 255, 0.45));
      box-shadow: 0 0 7px rgba(103, 213, 255, 0.18);
    }

    @keyframes floatDrift {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg) scale(1);
      }

      25% {
        transform: translateY(-18px) translateX(10px) rotate(3deg) scale(1.02);
      }

      50% {
        transform: translateY(-34px) translateX(-6px) rotate(6deg) scale(1);
      }

      75% {
        transform: translateY(-20px) translateX(14px) rotate(2deg) scale(0.98);
      }

      100% {
        transform: translateY(-52px) translateX(-8px) rotate(0deg) scale(1);
      }
    }

    @keyframes pulseNode {
      0%, 100% {
        opacity: 0.75;
        box-shadow: 0 0 8px rgba(103, 213, 255, 0.28);
      }

      50% {
        opacity: 1;
        box-shadow: 0 0 18px rgba(103, 213, 255, 0.62);
      }
    }

    .wrap {
      width: min(var(--max), 95%);
      margin: 0 auto;
      padding: 22px 0 40px;
      position: relative;
      z-index: 1;
    }

    .hero {
      height: 72vh;
      min-height: 430px;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.04) 0%, rgba(0, 0, 0, 0.09) 58%, rgba(0, 0, 0, 0.14) 100%),
        url('hero-new.jpg') center center / cover no-repeat,
        linear-gradient(180deg, #03060b, #09131d);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -60%;
      background: linear-gradient(115deg, transparent 35%, rgba(255, 255, 255, 0.10) 49%, transparent 63%);
      transform: translateX(-40%) rotate(8deg);
      animation: heroShine 7s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes heroShine {
      0%, 55% {
        transform: translateX(-45%) rotate(8deg);
        opacity: 0;
      }

      70% {
        opacity: 0.7;
      }

      100% {
        transform: translateX(45%) rotate(8deg);
        opacity: 0;
      }
    }

    .hero-badge-right {
      position: absolute;
      right: 3%;
      bottom: 5%;
      width: min(34%, 520px);
      z-index: 2;
      filter:
        drop-shadow(0 18px 28px rgba(0, 0, 0, 0.45))
        drop-shadow(0 0 22px rgba(43, 125, 255, 0.16));
    }

    .catalog {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      padding: 28px 20px 42px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      background:
        linear-gradient(rgba(4, 8, 15, 0.68), rgba(4, 8, 15, 0.90)),
        url('hero-new.jpg') center / cover no-repeat,
        linear-gradient(180deg, #03060b, #09131d);
    }

    .catalog::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 18%, rgba(43, 125, 255, 0.14), transparent 16%),
        radial-gradient(circle at 82% 20%, rgba(43, 125, 255, 0.12), transparent 18%),
        radial-gradient(circle at 70% 78%, rgba(103, 213, 255, 0.10), transparent 16%);
      opacity: 0.9;
    }

    .catalog-inner {
      position: relative;
      z-index: 1;
    }

    .catalog .sub {
      text-align: center;
      margin: 0 0 28px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #dbe8fa;
      opacity: 0.95;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .card {
      background: linear-gradient(180deg, rgba(7, 11, 20, 0.78), rgba(9, 15, 26, 0.94));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px 18px 18px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      transition: 0.24s ease;
      cursor: pointer;
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      min-height: 340px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, transparent, rgba(103, 213, 255, 0.14), transparent);
      opacity: 0;
      transition: 0.25s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--lineStrong);
      box-shadow:
        0 24px 48px rgba(0, 0, 0, 0.42),
        0 0 22px rgba(43, 125, 255, 0.18);
    }

    .card:hover::before {
      opacity: 1;
    }

    .product-thumb {
      width: 150px;
      height: 180px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.16);
      position: relative;
    }

    .product-thumb img {
      width: 150px;
      height: auto;
      filter: drop-shadow(0 16px 18px rgba(0, 0, 0, 0.40));
      transition: 0.25s ease;
    }

    .card:hover .product-thumb img {
      transform: translateY(-3px) scale(1.03);
      filter:
        drop-shadow(0 20px 24px rgba(0, 0, 0, 0.46))
        drop-shadow(0 0 12px rgba(103, 213, 255, 0.28))
        drop-shadow(0 0 24px rgba(43, 125, 255, 0.18));
    }

    .img-fallback {
      display: none;
      width: 150px;
      height: 180px;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      color: #bcd7ff;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 10px;
    }

    .verified-pill {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #07101d;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--verifiedGrad);
      box-shadow:
        0 8px 18px rgba(101, 223, 135, 0.30),
        0 0 18px rgba(245, 215, 110, 0.18);
      z-index: 2;
      border: 1px solid rgba(255, 255, 255, 0.55);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.2;
      color: #ffffff;
      min-height: 44px;
      position: relative;
      z-index: 1;
    }

    .price {
      margin: 0 0 14px;
      color: var(--green);
      font-size: 18px;
      font-weight: 900;
      position: relative;
      z-index: 1;
    }

    .card button {
      width: 100%;
      min-height: 44px;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      letter-spacing: 0.35px;
      color: #07101d;
      background: var(--btnGrad);
      box-shadow: 0 10px 18px rgba(47, 213, 255, 0.18);
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .footer {
      text-align: center;
      padding: 26px 0 6px;
      font-size: 12px;
      line-height: 1.7;
      color: #d7e2f3;
      opacity: 0.72;
    }

    #productModal,
    #coaZoomModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }

    #coaZoomModal {
      z-index: 10001;
      background: rgba(0, 0, 0, 0.92);
    }

    .modal-box {
      width: min(1180px, 100%);
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(rgba(4, 8, 15, 0.88), rgba(4, 8, 15, 0.96)),
        url('hero-new.jpg') center / cover no-repeat,
        linear-gradient(180deg, #03060b, #09131d);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 34px 80px rgba(0, 0, 0, 0.56);
    }

    .close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      z-index: 5;
    }

    .modal-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      padding: 28px;
      align-items: start;
    }

    .modal-left {
      display: flex;
      justify-content: center;
    }

    .modal-left .modal-thumb {
      width: 220px;
      min-height: 270px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.16);
      overflow: hidden;
      position: relative;
    }

    .modal-left img {
      width: 100%;
      max-width: 220px;
      filter:
        drop-shadow(0 20px 24px rgba(0, 0, 0, 0.46))
        drop-shadow(0 0 12px rgba(103, 213, 255, 0.18));
    }

    .modal-thumb-fallback {
      display: none;
      width: 220px;
      min-height: 270px;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      color: #bcd7ff;
      background: rgba(255, 255, 255, 0.04);
      padding: 16px;
    }

    .modal-right h2 {
      margin: 0 0 8px;
      font-size: 46px;
      line-height: 1.02;
      color: #ffffff;
    }

    .modal-price {
      font-size: 52px;
      line-height: 1;
      color: var(--green);
      font-weight: 900;
      margin-bottom: 18px;
    }

    .modal-panel {
      background: rgba(8, 12, 22, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      color: #eaf1fb;
    }

    .modal-panel h4 {
      margin: 0 0 10px;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--blue2);
    }

    .modal-panel ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.8;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .modal-actions button {
      min-height: 48px;
      padding: 0 18px;
      border: none;
      border-radius: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .coa-btn {
      color: #ffffff;
      background: linear-gradient(180deg, #18376a, #112955);
      border: 1px solid rgba(103, 182, 255, 0.34);
    }

    .info-btn {
      color: #07101d;
      background: var(--btnGrad);
    }

    .contact-btn {
      color: #ffffff;
      background: linear-gradient(180deg, #1b2a46, #121d31);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    .modal-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: #07101d;
      background: var(--verifiedGrad);
      box-shadow: 0 8px 18px rgba(101, 223, 135, 0.20);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .coa-viewer {
      margin-top: 18px;
      display: none;
    }

    .coa-viewer.show {
      display: block;
    }

    .coa-frame {
      width: 100%;
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 12px;
      min-height: 220px;
      position: relative;
    }

    .coa-frame::before {
      content: "LAB VERIFIED";
      position: absolute;
      top: 22px;
      right: 22px;
      z-index: 3;
      color: #07101d;
      background: var(--verifiedGrad);
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .coa-frame.no-coa::before {
      display: none;
    }

    .coa-frame img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      background: #ffffff;
      cursor: zoom-in;
    }

    .coa-error {
      display: none;
      color: #111111;
      background: #ffffff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      font-weight: 700;
      line-height: 1.6;
    }

    .coa-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .coa-toolbar .mini {
      font-size: 12px;
      color: #d1ddf0;
      opacity: 0.9;
    }

    .coa-toolbar button {
      min-height: 40px;
      padding: 0 14px;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, #ebf7ff, #d4efff);
      color: #07101d;
    }

    .zoom-box {
      position: relative;
      max-width: min(1200px, 96vw);
      max-height: 92vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }

    .zoom-topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffffff;
      gap: 12px;
      flex-wrap: wrap;
    }

    .zoom-title {
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .zoom-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .zoom-actions button {
      min-height: 42px;
      padding: 0 14px;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      color: #07101d;
      background: var(--btnGrad);
    }

    .zoom-canvas-wrap {
      width: 100%;
      max-height: calc(92vh - 76px);
      overflow: auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.40);
      position: relative;
    }

    .zoom-canvas-wrap::before {
      content: "LAB VERIFIED";
      position: sticky;
      top: 0;
      left: 100%;
      display: inline-block;
      z-index: 5;
      color: #07101d;
      background: var(--verifiedGrad);
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      margin: 0 0 8px auto;
    }

    .zoom-canvas-wrap img {
      width: 100%;
      height: auto;
      transform-origin: center center;
      transition: transform 0.18s ease;
      user-select: none;
      -webkit-user-drag: none;
      cursor: grab;
    }

    .zoom-canvas-wrap img.dragging {
      cursor: grabbing;
    }

    .hint {
      color: #d6e6ff;
      font-size: 12px;
      opacity: 0.78;
    }

    @media (max-width: 1100px) {
      .hero-badge-right {
        width: min(38%, 420px);
      }
    }

    @media (max-width: 920px) {
      .hero {
        height: 56vh;
        min-height: 320px;
      }

      .hero-badge-right {
        width: min(46%, 300px);
        right: 3%;
        bottom: 5%;
      }

      .modal-content {
        grid-template-columns: 1fr;
      }

      .modal-right h2 {
        font-size: 38px;
      }

      .modal-price {
        font-size: 42px;
      }
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero-badge-right {
        width: min(54%, 240px);
      }

      .modal-actions {
        flex-direction: column;
      }

      .modal-actions button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="molecule-bg" id="moleculeBg"></div>

  <div class="wrap">
    <section class="hero">
      <img class="hero-badge-right" src="hero-badge-v2.png" alt="Covenant Bio Labs">
    </section>

    <section class="catalog">
      <div class="catalog-inner">
        <p class="sub">Research Use Only</p>
        <div class="grid" id="productGrid"></div>
      </div>
    </section>

    <div class="footer">
      © 2026 Covenant Bio Labs<br>
      Research Use Only
    </div>
  </div>

  <div id="productModal"></div>

  <div id="coaZoomModal">
    <div class="zoom-box">
      <div class="zoom-topbar">
        <div>
          <div class="zoom-title" id="zoomTitle">Lab Verification Report</div>
          <div class="hint">Lab verified. Use zoom controls to inspect the report.</div>
        </div>
        <div class="zoom-actions">
          <button type="button" onclick="zoomOutCOA()">− Zoom Out</button>
          <button type="button" onclick="resetCOAZoom()">Reset</button>
          <button type="button" onclick="zoomInCOA()">+ Zoom In</button>
          <button type="button" onclick="closeCOAZoom()">Close</button>
        </div>
      </div>
      <div class="zoom-canvas-wrap" id="zoomWrap">
        <img id="zoomedCOAImage" src="" alt="COA zoomed view">
      </div>
    </div>
  </div>

  <script>

        assay: "536.16 mg",

    let currentProduct = null;
    let currentZoom = 1;
    const minZoom = 1;
    const maxZoom = 4;

    const grid = document.getElementById('productGrid');

    products.forEach((p) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openProduct(p.name);

      card.innerHTML = `
        <div class="product-thumb">
          <div class="verified-pill">Lab Verified</div>
          <img src="${p.img}" alt="${p.name}" onerror="showImageFallback(this)">
          <div class="img-fallback">${p.name}</div>
        </div>
        <h3>${p.name}</h3>
        <p class="price">${p.price}</p>
        <button type="button">View Details</button>
      `;

      grid.appendChild(card);
    });

    function openProduct(name) {
      const p = products.find(item => item.name === name);
      if (!p) return;
      currentProduct = p;

      const assayLine = p.assay ? `<li><strong>Assay:</strong> ${p.assay}</li>` : '';
      const purityLine = p.purity ? `<li><strong>Purity:</strong> ${p.purity}</li>` : '';
      const detailsLine = p.details ? `<li><strong>Details:</strong> ${p.details}</li>` : '';
      const coaButtonText = p.hasCOA ? 'View Lab Verified COA' : 'COA Status';

      const coaViewer = `
        <div class="coa-viewer" id="coaViewer">
          <div class="modal-panel">
            <div class="coa-toolbar">
              <div>
                <h4 style="margin:0;">Lab Verification Report</h4>
                <div class="mini">${p.hasCOA ? 'Certificate of Analysis available. Tap the report to zoom in.' : 'Lab verified. COA upload pending for this product.'}</div>
              </div>
              ${p.hasCOA ? `<button type="button" onclick="openCOAZoom()">Zoom In COA</button>` : ''}
            </div>
            <div class="coa-frame ${p.hasCOA ? '' : 'no-coa'}">
              ${p.hasCOA ? `
                <img id="modalCOAImage" src="${p.coaFile}" alt="${p.name} COA" onclick="openCOAZoom()" onerror="showCoaError(this)">
                <div class="coa-error">COA image not found. Check the filename in your repo.</div>
              ` : `
                <div class="coa-error" style="display:block;">Lab Verified — COA Upload Pending.</div>
              `}
            </div>
          </div>
        </div>
      `;

      const modal = document.getElementById('productModal');
      modal.style.display = 'flex';
      modal.innerHTML = `
        <div class="modal-box">
          <button class="close" onclick="closeModal()">×</button>
          <div class="modal-content">
            <div class="modal-left">
              <div class="modal-thumb">
                <div class="verified-pill">Lab Verified</div>
                <img src="${p.img}" alt="${p.name}" onerror="showModalImageFallback(this)">
                <div class="modal-thumb-fallback">${p.name}</div>
              </div>
            </div>

            <div class="modal-right">
              <div class="modal-status">Lab Verified</div>
              <h2>${p.name}</h2>
              <div class="modal-price">${p.price}</div>

              <div class="modal-panel">
                <h4>Product Information</h4>
                <ul>
                  <li><strong>Amount:</strong> ${p.amount}</li>
                  <li><strong>Form:</strong> ${p.form}</li>
                  ${detailsLine}
                  ${assayLine}
                  ${purityLine}
                </ul>
              </div>

              <div class="modal-panel">
                <h4>COA Verification</h4>
                <ul>
                  <li><strong>Status:</strong> ${p.coaStatus}</li>
                  <li><strong>Lab:</strong> ${p.lab}</li>
                </ul>
              </div>

              <div class="modal-panel">
                <h4>Important Notice</h4>
                <ul>
                  <li>For research use only.</li>
                  <li>Keep out of reach of children.</li>
                </ul>
              </div>

              <div class="modal-actions">
                <button class="coa-btn" type="button" onclick="toggleCOA()">${coaButtonText}</button>
                <button class="info-btn" type="button" onclick="scrollToTopOfModal()">Product Info</button>
                <button class="contact-btn" type="button" onclick="copyContactEmail()">Contact for Info</button>
              </div>

              ${coaViewer}
            </div>
          </div>
        </div>
      `;
    }

    function toggleCOA() {
      const viewer = document.getElementById('coaViewer');
      if (!viewer) return;
      viewer.classList.toggle('show');
    }

    function openCOAZoom() {
      if (!currentProduct || !currentProduct.hasCOA || !currentProduct.coaFile) return;

      const zoomModal = document.getElementById('coaZoomModal');
      const zoomedImage = document.getElementById('zoomedCOAImage');
      const zoomTitle = document.getElementById('zoomTitle');

      currentZoom = 1;
      zoomedImage.style.transform = 'scale(1)';
      zoomedImage.src = currentProduct.coaFile;
      zoomTitle.textContent = `${currentProduct.name} — Lab Verification Report`;
      zoomModal.style.display = 'flex';
    }

    function closeCOAZoom() {
      document.getElementById('coaZoomModal').style.display = 'none';
      resetCOAZoom();
    }

    function zoomInCOA() {
      currentZoom = Math.min(maxZoom, +(currentZoom + 0.25).toFixed(2));
      applyCOAZoom();
    }

    function zoomOutCOA() {
      currentZoom = Math.max(minZoom, +(currentZoom - 0.25).toFixed(2));
      applyCOAZoom();
    }

    function resetCOAZoom() {
      currentZoom = 1;
      applyCOAZoom();
      const wrap = document.getElementById('zoomWrap');
      if (wrap) {
        wrap.scrollTop = 0;
        wrap.scrollLeft = 0;
      }
    }

    function applyCOAZoom() {
      const zoomedImage = document.getElementById('zoomedCOAImage');
      if (zoomedImage) {
        zoomedImage.style.transform = `scale(${currentZoom})`;
      }
    }

    function scrollToTopOfModal() {
      const modal = document.getElementById('productModal');
      if (modal) {
        modal.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function copyContactEmail() {
      const email = 'info@covenantbiolabs.com';
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(email).then(() => {
          alert(`Copied: ${email}`);
        }).catch(() => {
          alert(email);
        });
      } else {
        alert(email);
      }
    }

    function showImageFallback(img) {
      img.style.display = 'none';
      const fallback = img.parentElement.querySelector('.img-fallback');
      if (fallback) fallback.style.display = 'flex';
    }

    function showModalImageFallback(img) {
      img.style.display = 'none';
      const fallback = img.parentElement.querySelector('.modal-thumb-fallback');
      if (fallback) fallback.style.display = 'flex';
    }

    function showCoaError(img) {
      img.style.display = 'none';
      const err = img.parentElement.querySelector('.coa-error');
      if (err) err.style.display = 'block';
    }

    function closeModal() {
      const modal = document.getElementById('productModal');
      modal.style.display = 'none';
      modal.innerHTML = '';
      currentProduct = null;
    }

    document.getElementById('productModal').addEventListener('click', function(e) {
      if (e.target.id === 'productModal') closeModal();
    });

    document.getElementById('coaZoomModal').addEventListener('click', function(e) {
      if (e.target.id === 'coaZoomModal') closeCOAZoom();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeCOAZoom();
        closeModal();
      }
    });

    const zoomWrap = document.getElementById('zoomWrap');
    const zoomedImage = document.getElementById('zoomedCOAImage');

    zoomWrap.addEventListener('wheel', function(e) {
      if (document.getElementById('coaZoomModal').style.display !== 'flex') return;
      e.preventDefault();
      if (e.deltaY < 0) {
        zoomInCOA();
      } else {
        zoomOutCOA();
      }
    }, { passive: false });

    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let scrollLeft = 0;
    let scrollTop = 0;

    zoomedImage.addEventListener('mousedown', (e) => {
      if (currentZoom <= 1) return;
      isDragging = true;
      zoomedImage.classList.add('dragging');
      startX = e.pageX - zoomWrap.offsetLeft;
      startY = e.pageY - zoomWrap.offsetTop;
      scrollLeft = zoomWrap.scrollLeft;
      scrollTop = zoomWrap.scrollTop;
    });

    zoomedImage.addEventListener('mouseleave', () => {
      isDragging = false;
      zoomedImage.classList.remove('dragging');
    });

    zoomedImage.addEventListener('mouseup', () => {
      isDragging = false;
      zoomedImage.classList.remove('dragging');
    });

    zoomedImage.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const x = e.pageX - zoomWrap.offsetLeft;
      const y = e.pageY - zoomWrap.offsetTop;
      const walkX = (x - startX) * 1.2;
      const walkY = (y - startY) * 1.2;
      zoomWrap.scrollLeft = scrollLeft - walkX;
      zoomWrap.scrollTop = scrollTop - walkY;
    });

    function makeMolecule(top, left, scale, duration, delay) {
      return `
        <div class="molecule" style="top:${top}%; left:${left}%; transform:scale(${scale}); animation-duration:${duration}s; animation-delay:${delay}s;">
          <div class="node" style="left:0px; top:0px;"></div>
          <div class="node" style="left:42px; top:16px;"></div>
          <div class="node" style="left:82px; top:-6px;"></div>
          <div class="node" style="left:112px; top:26px;"></div>
          <div class="bond" style="left:5px; top:5px; width:42px; transform:rotate(20deg);"></div>
          <div class="bond" style="left:47px; top:20px; width:45px; transform:rotate(-28deg);"></div>
          <div class="bond" style="left:87px; top:0px; width:40px; transform:rotate(42deg);"></div>
        </div>
      `;
    }

    document.getElementById('moleculeBg').innerHTML =
      makeMolecule(6, 4, 1.15, 22, 0) +
      makeMolecule(12, 80, 1.35, 28, -3) +
      makeMolecule(24, 56, 0.90, 20, -6) +
      makeMolecule(38, 12, 1.00, 24, -2) +
      makeMolecule(52, 84, 1.22, 26, -8) +
      makeMolecule(68, 8, 0.92, 19, -4) +
      makeMolecule(74, 52, 1.05, 22, -5) +
      makeMolecule(84, 88, 0.82, 17, -7);
  </script>
