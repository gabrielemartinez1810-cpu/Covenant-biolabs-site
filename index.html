<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covenant Bio Labs</title>
  <meta name="description" content="Premium research catalog." />
  <style>
    :root{
      --bg:#03060b;
      --bg2:#07111b;
      --blue:#2b7dff;
      --blue2:#67d5ff;
      --green:#65df87;
      --white:#f5f8ff;
      --shadow:0 24px 60px rgba(0,0,0,.50);
      --max:1400px;
      --radius:28px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--white);
      background:
        radial-gradient(circle at 10% 8%, rgba(43,125,255,.12), transparent 22%),
        radial-gradient(circle at 88% 12%, rgba(103,213,255,.10), transparent 18%),
        linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
      overflow-x:hidden;
      min-height:100vh;
    }

    button,input{font:inherit}
    img{max-width:100%;display:block}

    .molecule-bg{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
      opacity:.52;
    }

    .molecule{
      position:absolute;
      animation:floatDrift linear infinite;
      filter:drop-shadow(0 0 10px rgba(103,213,255,.18));
    }

    .molecule .node{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff, #8ddfff 35%, #2b7dff 80%);
      box-shadow:0 0 10px rgba(103,213,255,.4);
      animation:pulseNode 4s ease-in-out infinite;
    }

    .molecule .bond{
      position:absolute;
      height:2px;
      transform-origin:left center;
      background:linear-gradient(90deg, rgba(255,255,255,.78), rgba(103,213,255,.45));
      box-shadow:0 0 7px rgba(103,213,255,.18);
    }

    @keyframes floatDrift{
      0%{ transform:translateY(0) translateX(0) rotate(0deg) scale(1); }
      25%{ transform:translateY(-18px) translateX(10px) rotate(3deg) scale(1.02); }
      50%{ transform:translateY(-34px) translateX(-6px) rotate(6deg) scale(1); }
      75%{ transform:translateY(-20px) translateX(14px) rotate(2deg) scale(.98); }
      100%{ transform:translateY(-52px) translateX(-8px) rotate(0deg) scale(1); }
    }
