<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Covenant Bio Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0a0f1c, #000);
  color:white;
}

/* HERO */

.hero {
  height: 80vh;
  background: url('hero.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
}

.hero-content {
  position:relative;
  z-index:2;
}

.logo {
  width:80px;
  margin-bottom:15px;
}

.title {
  font-family:'Orbitron', sans-serif;
  font-size:42px;
  letter-spacing:2px;
}

.subtitle {
  color:#00d4ff;
  margin-top:10px;
  letter-spacing:2px;
}

.tagline {
  margin-top:10px;
  font-size:14px;
  opacity:0.7;
}

/* PRODUCTS SECTION */

.products-section {
  padding:60px 20px;
  text-align:center;
}

.section-title {
  font-family:'Orbitron', sans-serif;
  font-size:28px;
  margin-bottom:30px;
}

/* FULL IMAGE GRID */

.product-image-wrapper {
  display:flex;
  justify-content:center;
}

.product-image {
  width:100%;
  max-width:1200px;
  border-radius:12px;
  box-shadow:0 0 40px rgba(0,212,255,0.15);
}

/* ORDER SECTION */

.order-section {
  margin-top:60px;
}

.order-buttons {
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

.btn {
  padding:14px 30px;
  border-radius:8px;
  font-weight:600;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.zelle {
  background: linear-gradient(90deg, #6c2bd9, #9d4edd);
}

.cashapp {
  background: linear-gradient(90deg, #00c853, #00e676);
}

.btn:hover {
  transform:scale(1.05);
}

/* FOOTER */

.footer {
  text-align:center;
  margin-top:60px;
  font-size:12px;
  opacity:0.6;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <img src="logo.jpg" class="logo">

    <div class="title">COVENANT BIO LABS</div>
    <div class="subtitle">FAITH • SCIENCE • PURPOSE</div>
    <div class="tagline">Premium Research Peptides & Advanced Compounds</div>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products-section">

  <div class="section-title">CATALOG</div>

  <div class="product-image-wrapper">
    <img src="products.png" class="product-image">
  </div>

</div>

<!-- ORDER -->
<div class="products-section order-section">

  <div class="section-title">PLACE ORDER</div>

  <p style="opacity:0.7;">Payments accepted via Zelle or Cash App</p>

  <div class="order-buttons">
    <a href="#" class="btn zelle">PAY VIA ZELLE</a>
    <a href="#" class="btn cashapp">PAY VIA CASH APP</a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Covenant Bio Labs — Research Use Only • Not for Human Consumption
</div>

</body>
</html>
