<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covenant Bio Labs</title>
  <style>
    :root{
      --bg:#05070d;
      --panel:#0c1220;
      --panel-2:#101a2c;
      --line:#1d2a44;
      --text:#eef4ff;
      --muted:#97a7c6;
      --blue:#4da3ff;
      --blue-2:#1f6fff;
      --green:#30d158;
      --shadow:0 20px 50px rgba(0,0,0,.45);
      --radius:20px;
      --max:1180px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(44,105,255,.18), transparent 25%),
        radial-gradient(circle at left center, rgba(77,163,255,.14), transparent 20%),
        linear-gradient(180deg,#05070d 0%,#07101b 100%);
      color:var(--text);
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .topbar{
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(5,7,13,.75);
      backdrop-filter: blur(14px);
      position:sticky;
      top:0;
      z-index:50;
    }

    .nav{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
      letter-spacing:.04em;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.7);
      display:grid;
      place-items:center;
      font-size:22px;
      color:var(--blue);
      box-shadow:0 0 24px rgba(77,163,255,.18);
    }

    .brand-text{
      display:flex;
      flex-direction:column;
      line-height:1.05;
    }

    .brand-text span:first-child{
      font-size:18px;
      letter-spacing:.08em;
    }

    .brand-text span:last-child{
      font-size:11px;
      color:var(--muted);
      letter-spacing:.22em;
      margin-top:4px;
    }

    .nav-links{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
    }

    .hero{
      padding:64px 0 28px;
    }

    .hero-wrap{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:28px;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex;
      gap:10px;
      align-items:center;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#d6e6ff;
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .dot{
      width:8px;height:8px;border-radius:50%;background:var(--green);
      box-shadow:0 0 12px rgba(48,209,88,.6);
    }

    h1{
      font-size:clamp(36px, 6vw, 64px);
      line-height:1.02;
      margin:18px 0 16px;
      letter-spacing:-.03em;
    }

    .lead{
      font-size:18px;
      line-height:1.7;
      color:var(--muted);
      max-width:720px;
      margin:0 0 28px;
    }

    .hero-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 18px;
      border-radius:14px;
      border:1px solid transparent;
      font-weight:700;
      letter-spacing:.02em;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(180deg, var(--blue), var(--blue-2));
      color:white;
      box-shadow:0 10px 25px rgba(31,111,255,.35);
    }

    .btn-secondary{
      background:rgba(255,255,255,.04);
      border-color:rgba(255,255,255,.1);
      color:#e5eeff;
    }

    .hero-card{
      background:
        radial-gradient(circle at top right, rgba(77,163,255,.22), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
      min-height:100%;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:12px;
    }

    .mini{
      background:rgba(5,10,20,.6);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
    }

    .mini h4{
      margin:0 0 8px;
      font-size:13px;
      color:#cfe0ff;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .mini p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .section{
      padding:28px 0 18px;
    }
