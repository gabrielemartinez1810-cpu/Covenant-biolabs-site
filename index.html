<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covenant Bio Labs</title>
  <meta name="description" content="Premium research catalog." />
  <style>
    :root{
      --bg:#03060b;
      --bg2:#08111b;
      --panel:rgba(8,12,22,.82);
      --panel2:rgba(10,16,28,.94);
      --line:rgba(103,182,255,.22);
      --blue:#2b7dff;
      --blue2:#67d5ff;
      --green:#65df87;
      --white:#f5f8ff;
      --text:#eaf1ff;
      --muted:#d7e3f8;
      --shadow:0 24px 60px rgba(0,0,0,.50);
      --max:1400px;
      --radius:28px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(43,125,255,.12), transparent 22%),
        radial-gradient(circle at 88% 12%, rgba(103,213,255,.10), transparent 18%),
        linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
      overflow-x:hidden;
      min-height:100vh;
    }

    img{display:block;max-width:100%}
    button,input{font:inherit}

    .molecule-bg{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
      opacity:.5;
    }

    .molecule{
      position:absolute;
      animation:floatDrift linear infinite;
      filter:drop-shadow(0 0 10px rgba(103,213,255,.18));
    }

    .molecule .node{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff, #8ddfff 35%, #2b7dff 80%);
      box-shadow:0 0 10px rgba(103,213,255,.4);
      animation:pulseNode 4s ease-in-out infinite;
    }

    .molecule .bond{
      position:absolute;
      height:2px;
      transform-origin:left center;
      background:linear-gradient(90deg, rgba(255,255,255,.78), rgba(103,213,255,.45));
      box-shadow:0 0 7px rgba(103,213,255,.18);
    }

    @keyframes floatDrift{
      0%{ transform:translateY(0) translateX(0) rotate(0deg) scale(1); }
      25%{ transform:translateY(-18px) translateX(10px) rotate(3deg) scale(1.02); }
      50%{ transform:translateY(-34px) translateX(-6px) rotate(6deg) scale(1); }
      75%{ transform:translateY(-20px) translateX(14px) rotate(2deg) scale(.98); }
      100%{ transform:translateY(-52px) translateX(-8px) rotate(0deg) scale(1); }
    }

    @keyframes pulseNode{
      0%,100%{ opacity:.75; box-shadow:0 0 8px rgba(103,213,255,.28); }
      50%{ opacity:1; box-shadow:0 0 18px rgba(103,213,255,.62); }
    }

    .wrap{
      width:min(var(--max), 95%);
      margin:0 auto;
      padding:22px 0 40px;
      position:relative;
      z-index:1;
    }

    .hero{
      height:72vh;
      min-height:430px;
      border-radius:var(--radius);
      overflow:hidden;
      position:relative;
      background:
        linear-gradient(180deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.08) 58%, rgba(0,0,0,.14) 100%),
        url('hero-new.jpg') center center/cover no-repeat,
        linear-gradient(180deg,#03060b,#09131d);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      margin-bottom:28px;
    }

    .hero-brand{
      position:absolute;
      right:3.2%;
      bottom:6%;
      width:min(36%, 520px);
      z-index:2;
      padding:22px 22px 20px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(5,8,16,.10), rgba(5,8,16,.05));
      backdrop-filter:blur(1px);
      filter:drop-shadow(0 18px 28px rgba(0,0,0,.40));
    }

    .brand-mark{
      display:flex;
      align-items:center;
      justify-content:center;
      width:86px;
      height:86px;
      margin:0 auto 10px;
      border:4px solid rgba(255,255,255,.95);
      border-radius:50%;
      color:#2b7dff;
      font-weight:700;
      font-size:52px;
      line-height:1;
      position:relative;
      text-shadow:0 0 18px rgba(43,125,255,.24);
      box-shadow:0 0 24px rgba(43,125,255,.14);
      background:rgba(0,0,0,.08);
    }

    .brand-mark::before{
      content:"";
      position:absolute;
      left:10px;
      top:8px;
      bottom:8px;
      width:14px;
      border-left:2px solid rgba(255,255,255,.9);
      border-right:2px solid rgba(255,255,255,.9);
      border-radius:10px;
      opacity:.7;
    }

    .brand-title{
      text-align:center;
      text-transform:uppercase;
      margin:0;
      font-weight:300;
      letter-spacing:7px;
      line-height:1;
      font-size:clamp(40px, 4.6vw, 72px);
      color:#f0f3f8;
      text-shadow:0 2px 14px rgba(0,0,0,.28);
    }

    .brand-subtitle{
      text-align:center;
      text-transform:uppercase;
      margin:10px 0 0;
      letter-spacing:11px;
      font-size:clamp(18px, 2vw, 31px);
      color:#dfe5ef;
      text-shadow:0 2px 14px rgba(0,0,0,.28);
    }

    .brand-line{
      width:100%;
      max-width:360px;
      height:2px;
      margin:14px auto;
      background:linear-gradient(90deg, transparent, rgba(43,125,255,.95), transparent);
      box-shadow:0 0 16px rgba(43,125,255,.24);
    }

    .brand-tag{
      margin:0;
      text-align:center;
      font-size:clamp(13px, 1.15vw, 18px);
      letter-spacing:4px;
      text-transform:uppercase;
      color:#edf2f9;
    }

    .brand-desc{
      margin:16px 0 0;
      text-align:center;
      font-size:clamp(13px, 1.2vw, 20px);
      line-height:1.45;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#5d9dff;
      text-shadow:0 0 16px rgba(43,125,255,.18);
    }

    .catalog{
      position:relative;
      border-radius:var(--radius);
      overflow:hidden;
      padding:28px 20px 42px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      background:
        linear-gradient(rgba(4,8,15,.68), rgba(4,8,15,.90)),
        url('hero-new.jpg') center/cover no-repeat,
        linear-gradient(180deg,#03060b,#09131d);
    }

    .catalog::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.42;
      background:
        radial-gradient(circle at 8% 16%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 12% 24%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 12%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 20%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 30% 13%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 82% 16%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 88% 24%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 92% 13%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 28%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 12% 82%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 72%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 26% 76%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 82%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 90% 72%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 76%, rgba(103,213,255,.95) 0 2px, transparent 3px),
        linear-gradient(135deg, transparent 49.85%, rgba(103,213,255,.18) 49.95%, rgba(103,213,255,.18) 50.05%, transparent 50.15%),
        linear-gradient(45deg, transparent 49.85%, rgba(103,213,255,.12) 49.95%, rgba(103,213,255,.12) 50.05%, transparent 50.15%);
      mask-image:radial-gradient(circle at center, black 24%, rgba(0,0,0,.86) 68%, transparent 100%);
      -webkit-mask-image:radial-gradient(circle at center, black 24%, rgba(0,0,0,.86) 68%, transparent 100%);
    }

    .catalog::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 18%, rgba(43,125,255,.14), transparent 16%),
        radial-gradient(circle at 82% 20%, rgba(43,125,255,.12), transparent 18%),
        radial-gradient(circle at 70% 78%, rgba(103,213,255,.10), transparent 16%);
      opacity:.9;
    }

    .catalog-inner{ position:relative; z-index:1; }

    .catalog .sub{
      text-align:center;
      margin:0 0 28px;
      font-size:14px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#dbe8fa;
      opacity:.95;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:22px;
    }

    .card{
      background:linear-gradient(180deg, rgba(7,11,20,.78), rgba(9,15,26,.94));
      border:1px solid rgba(103,182,255,.22);
      border-radius:22px;
      padding:20px 18px 18px;
      box-shadow:0 16px 36px rgba(0,0,0,.34);
      transition:.24s ease;
      cursor:pointer;
      text-align:center;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      position:relative;
      overflow:hidden;
      min-height:325px;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-20% -10%;
      background:radial-gradient(circle at 50% 10%, rgba(103,213,255,.14), transparent 32%);
      opacity:0;
      transition:.25s ease;
      pointer-events:none;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:rgba(103,213,255,.52);
      box-shadow:
        0 24px 48px rgba(0,0,0,.42),
        0 0 22px rgba(43,125,255,.18);
    }

    .card:hover::before{ opacity:1; }

    .card img{
      width:145px;
      height:auto;
      margin:0 auto 16px;
      filter:drop-shadow(0 16px 18px rgba(0,0,0,.40));
      transition:.25s ease;
    }

    .card:hover img{
      transform:translateY(-3px) scale(1.03);
      filter:
        drop-shadow(0 20px 24px rgba(0,0,0,.46))
        drop-shadow(0 0 12px rgba(103,213,255,.28))
        drop-shadow(0 0 24px rgba(43,125,255,.18));
    }

    .card h3{
      margin:0 0 8px;
      font-size:18px;
      line-height:1.2;
      color:#fff;
    }

    .price{
      margin:0 0 14px;
      color:var(--green);
      font-size:18px;
      font-weight:800;
    }

    .card button{
      width:100%;
      min-height:42px;
      border:none;
      border-radius:12px;
      font-weight:800;
      letter-spacing:.3px;
      color:#07101d;
      background:linear-gradient(180deg,#79eaff,#2fd5ff);
      box-shadow:0 10px 18px rgba(47,213,255,.18);
      cursor:pointer;
    }

    .footer{
      text-align:center;
      padding:26px 0 6px;
      font-size:12px;
      line-height:1.7;
      color:#d7e2f3;
      opacity:.72;
    }

    #productModal{
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:rgba(0,0,0,.78);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .modal-box{
      width:min(1060px, 100%);
      border-radius:28px;
      overflow:hidden;
      position:relative;
      background:
        linear-gradient(rgba(4,8,15,.84), rgba(4,8,15,.95)),
        url('hero-new.jpg') center/cover no-repeat,
        linear-gradient(180deg,#03060b,#09131d);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 34px 80px rgba(0,0,0,.56);
    }

    .modal-box::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 78% 28%, rgba(43,125,255,.16), transparent 22%),
        linear-gradient(180deg, rgba(3,6,12,.18), rgba(3,6,12,.38));
      pointer-events:none;
    }

    .close{
      position:absolute;
      top:16px;
      right:16px;
      width:44px;
      height:44px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:24px;
      line-height:1;
      cursor:pointer;
      z-index:2;
    }

    .modal-content{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:280px 1fr;
      gap:28px;
      padding:30px;
      align-items:start;
    }

    .modal-left img{
      width:100%;
      max-width:240px;
      margin:6px auto 0;
      filter:
        drop-shadow(0 20px 24px rgba(0,0,0,.46))
        drop-shadow(0 0 12px rgba(103,213,255,.18));
    }

    .modal-right h2{
      margin:0 0 10px;
      font-size:52px;
      line-height:1;
      color:#fff;
    }

    .modal-price{
      font-size:56px;
      line-height:1;
      color:var(--green);
      font-weight:900;
      margin-bottom:18px;
    }

    .modal-panel{
      background:rgba(8,12,22,.64);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
      color:#eaf1fb;
    }

    .modal-panel h4{
      margin:0 0 10px;
      font-size:20px;
      text-transform:uppercase;
      letter-spacing:1px;
      color:var(--blue2);
    }

    .modal-panel ul{
      margin:0;
      padding-left:18px;
      line-height:1.8;
    }

    .modal-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .modal-actions button,
    .modal-actions a{
      min-height:48px;
      padding:0 18px;
      border:none;
      border-radius:14px;
      font-weight:800;
      letter-spacing:.5px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    .coa-btn{
      color:#fff;
      background:linear-gradient(180deg,#18376a,#112955);
      border:1px solid rgba(103,182,255,.34);
    }

    .coa-btn.disabled{
      opacity:.55;
      cursor:not-allowed;
      pointer-events:none;
    }

    .info-btn{
      color:#07101d;
      background:linear-gradient(180deg,#79eaff,#2fd5ff);
    }

    .contact-btn{
      color:#fff;
      background:linear-gradient(180deg,#1b2a46,#121d31);
      border:1px solid rgba(255,255,255,.10);
    }

    @media (max-width: 1100px){
      .hero-brand{ width:min(42%, 430px); }
    }

    @media (max-width: 920px){
      .hero{
        height:56vh;
        min-height:320px;
      }
      .hero-brand{
        width:min(54%, 360px);
        right:4%;
        bottom:5%;
        padding:18px;
      }
      .brand-title{ font-size:clamp(30px, 7vw, 48px); }
      .brand-subtitle{ font-size:clamp(16px, 3vw, 22px); letter-spacing:7px; }
      .brand-tag{ letter-spacing:2px; }
      .brand-desc{ letter-spacing:2px; }
      .modal-content{
        grid-template-columns:1fr;
      }
      .modal-right h2{ font-size:38px; }
      .modal-price{ font-size:42px; }
    }

    @media (max-width: 640px){
      .grid{ grid-template-columns:1fr; }
      .hero-brand{ width:min(66%, 280px); }
      .brand-mark{
        width:68px;
        height:68px;
        font-size:40px;
      }
    }
  </style>
</head>

        amount:"10mg",
        form:"Lyophilized powder",
        assay:"11.55 mg",
        purity:"99.793%",
        coaStatus:"Verified",
        lab:"Janoshik",
        coaFile:"coa-selank-10mg.jpg"
      },
      {
        name:"GLOW",
        price:"$100",
        img:"glow.png",
        amount:"BT 10mg + BPC 10mg + CU 50mg",
        form:"Lyophilized powder",
        details:"Blend presentation",
        coaStatus:"COA pending upload",
        lab:"Janoshik",
        coaFile:""
      },
      {
        name:"KLOW",
        price:"$120",
        img:"klow.png",
        amount:"BT 10mg + BPC 10mg + CU 50mg + KP 10mg",
        form:"Lyophilized powder",
        details:"Blend presentation",
        coaStatus:"COA pending upload",
        lab:"Janoshik",
        coaFile:""
      }
    ];

    const grid = document.getElementById('productGrid');

    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openProduct(p.name);
      card.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p class="price">${p.price}</p>
        <button>View Details</button>
      `;
      grid.appendChild(card);
    });

    function openProduct(name) {
      const p = products.find(item => item.name === name);
      if (!p) return;

      const assayLine = p.assay ? `<li><strong>Assay:</strong> ${p.assay}</li>` : '';
      const purityLine = p.purity ? `<li><strong>Purity:</strong> ${p.purity}</li>` : '';
      const detailsLine = p.details ? `<li><strong>Details:</strong> ${p.details}</li>` : '';
      const coaButton = p.coaFile
        ? `<a class="coa-btn" href="${p.coaFile}" target="_blank" rel="noopener noreferrer">View COA</a>`
        : `<span class="coa-btn disabled">COA Pending</span>`;

      const modal = document.getElementById('productModal');
      modal.style.display = 'flex';
      modal.innerHTML = `
        <div class="modal-box">
          <button class="close" onclick="closeModal()">×</button>
          <div class="modal-content">
            <div class="modal-left">
              <img src="${p.img}" alt="${p.name}">
            </div>
            <div class="modal-right">
              <h2>${p.name}</h2>
              <div class="modal-price">${p.price}</div>

              <div class="modal-panel">
                <h4>Product Information</h4>
                <ul>
                  <li><strong>Amount:</strong> ${p.amount}</li>
                  <li><strong>Form:</strong> ${p.form}</li>
                  ${detailsLine}
                  ${assayLine}
                  ${purityLine}
                </ul>
              </div>

              <div class="modal-panel">
                <h4>COA Verification</h4>
                <ul>
                  <li><strong>Status:</strong> ${p.coaStatus}</li>
                  <li><strong>Lab:</strong> ${p.lab}</li>
                </ul>
              </div>

              <div class="modal-panel">
                <h4>Important Notice</h4>
                <ul>
                  <li>For research use only.</li>
                  <li>Keep out of reach of children.</li>
                </ul>
              </div>

              <div class="modal-actions">
                ${coaButton}
                <button class="info-btn" type="button">Product Info</button>
                <button class="contact-btn" type="button">Contact for Info</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function closeModal() {
      const modal = document.getElementById('productModal');
      modal.style.display = 'none';
      modal.innerHTML = '';
    }

    document.getElementById('productModal').addEventListener('click', function(e){
      if (e.target.id === 'productModal') closeModal();
    });

    function makeMolecule(top, left, scale, duration, delay){
      return `
        <div class="molecule" style="top:${top}%; left:${left}%; transform:scale(${scale}); animation-duration:${duration}s; animation-delay:${delay}s;">
          <div class="node" style="left:0px; top:0px;"></div>
          <div class="node" style="left:42px; top:16px;"></div>
          <div class="node" style="left:82px; top:-6px;"></div>
          <div class="node" style="left:112px; top:26px;"></div>
          <div class="bond" style="left:5px; top:5px; width:42px; transform:rotate(20deg);"></div>
          <div class="bond" style="left:47px; top:20px; width:45px; transform:rotate(-28deg);"></div>
          <div class="bond" style="left:87px; top:0px; width:40px; transform:rotate(42deg);"></div>
        </div>
      `;
    }

    document.getElementById('moleculeBg').innerHTML =
      makeMolecule(6, 4, 1.15, 22, 0) +
      makeMolecule(12, 80, 1.35, 28, -3) +
      makeMolecule(24, 56, 0.90, 20, -6) +
      makeMolecule(38, 12, 1.00, 24, -2) +
      makeMolecule(52, 84, 1.22, 26, -8) +
      makeMolecule(68, 8, 0.92, 19, -4) +
      makeMolecule(74, 52, 1.05, 22, -5) +
      makeMolecule(84, 88, 0.82, 17, -7);
  </script>
