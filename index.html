let currentProduct=null,currentZoom=1,cart=[];const minZoom=1,maxZoom=4,grid=document.getElementById('productGrid');
products.forEach(p=>{const card=document.createElement('div');card.className='card';card.onclick=()=>openProduct(p.name);card.innerHTML=`<div class="product-thumb"><div class="verified-pill">Lab Verified</div><img src="${p.img}" alt="${p.name}" onerror="showImageFallback(this)"><div class="img-fallback">${p.name}</div></div><h3>${p.name}</h3><p class="price">${p.price}</p><button type="button">View Details</button>`;grid.appendChild(card);});
function openProduct(name){const p=products.find(item=>item.name===name);if(!p)return;currentProduct=p;const assayLine=p.assay?`<li><strong>Assay:</strong> ${p.assay}</li>`:'';const purityLine=p.purity?`<li><strong>Purity:</strong> ${p.purity}</li>`:'';const detailsLine=p.details?`<li><strong>Details:</strong> ${p.details}</li>`:'';const coaButtonText=p.hasCOA?'View Lab Verified COA':'COA Status';const coaViewer=`<div class="coa-viewer" id="coaViewer"><div class="modal-panel"><div class="coa-toolbar"><div><h4 style="margin:0;">Lab Verification Report</h4><div class="mini">${p.hasCOA?'Certificate of Analysis available. Tap the report to zoom in.':'Lab verified. COA upload pending for this product.'}</div></div>${p.hasCOA?`<button type="button" onclick="openCOAZoom()">Zoom In COA</button>`:''}</div><div class="coa-frame ${p.hasCOA?'':'no-coa'}">${p.hasCOA?`<img id="modalCOAImage" src="${p.coaFile}" alt="${p.name} COA" onclick="openCOAZoom()" onerror="showCoaError(this)"><div class="coa-error">COA image not found. Check the filename in your repo.</div>`:`<div class="coa-error" style="display:block;">Lab Verified â COA Upload Pending.</div>`}</div></div></div>`;const modal=document.getElementById('productModal');modal.style.display='flex';modal.innerHTML=`<div class="modal-box"><button class="close" onclick="closeModal()">Ã</button><div class="modal-content"><div class="modal-left"><div class="modal-thumb"><div class="verified-pill">Lab Verified</div><img src="${p.img}" alt="${p.name}" onerror="showModalImageFallback(this)"><div class="modal-thumb-fallback">${p.name}</div></div></div><div class="modal-right"><div class="modal-status">Lab Verified</div><h2>${p.name}</h2><div class="modal-price">${p.price}</div><div class="modal-panel"><h4>Product Information</h4><ul><li><strong>Amount:</strong> ${p.amount}</li><li><strong>Form:</strong> ${p.form}</li>${detailsLine}${assayLine}${purityLine}</ul></div><div class="modal-panel"><h4>COA Verification</h4><ul><li><strong>Status:</strong> ${p.coaStatus}</li><li><strong>Lab:</strong> ${p.lab}</li></ul></div><div class="modal-panel"><h4>Important Notice</h4><ul><li>For research use only.</li><li>Keep out of reach of children.</li></ul></div><div class="modal-actions"><button class="coa-btn" type="button" onclick="toggleCOA()">${coaButtonText}</button><button class="info-btn" type="button" onclick="addToCart(currentProduct)">Add to Cart</button><button class="contact-btn" type="button" onclick="copyContactEmail()">Contact for Info</button></div>${coaViewer}</div></div></div>`;}
function toggleCOA(){const viewer=document.getElementById('coaViewer');if(viewer)viewer.classList.toggle('show');}
function openCOAZoom(){if(!currentProduct||!currentProduct.hasCOA||!currentProduct.coaFile)return;const zoomModal=document.getElementById('coaZoomModal'),zoomedImage=document.getElementById('zoomedCOAImage'),zoomTitle=document.getElementById('zoomTitle');currentZoom=1;zoomedImage.style.transform='scale(1)';zoomedImage.src=currentProduct.coaFile;zoomTitle.textContent=`${currentProduct.name} â Lab Verification Report`;zoomModal.style.display='flex';}
function closeCOAZoom(){document.getElementById('coaZoomModal').style.display='none';resetCOAZoom();}
function zoomInCOA(){currentZoom=Math.min(maxZoom,+(currentZoom+.25).toFixed(2));applyCOAZoom();}
function zoomOutCOA(){currentZoom=Math.max(minZoom,+(currentZoom-.25).toFixed(2));applyCOAZoom();}
function resetCOAZoom(){currentZoom=1;applyCOAZoom();const wrap=document.getElementById('zoomWrap');if(wrap){wrap.scrollTop=0;wrap.scrollLeft=0;}}
function applyCOAZoom(){const zoomedImage=document.getElementById('zoomedCOAImage');if(zoomedImage)zoomedImage.style.transform=`scale(${currentZoom})`;}
function copyContactEmail(){const email='info@covenantbiolabs.com';if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(email).then(()=>alert(`Copied: ${email}`)).catch(()=>alert(email));}else{alert(email);}}
function showImageFallback(img){img.style.display='none';const fallback=img.parentElement.querySelector('.img-fallback');if(fallback)fallback.style.display='flex';}
function showModalImageFallback(img){img.style.display='none';const fallback=img.parentElement.querySelector('.modal-thumb-fallback');if(fallback)fallback.style.display='flex';}
function showCoaError(img){img.style.display='none';const err=img.parentElement.querySelector('.coa-error');if(err)err.style.display='block';}
function closeModal(){const modal=document.getElementById('productModal');modal.style.display='none';modal.innerHTML='';currentProduct=null;}
function priceNumber(price){return Number(String(price).replace(/[^0-9.]/g,''))||0;}
function addToCart(product){if(!product)return;const existing=cart.find(item=>item.name===product.name);if(existing){existing.quantity+=1;}else{cart.push({name:product.name,priceText:product.price,price:priceNumber(product.price),quantity:1});}updateCartUI();closeModal();openCart();}
function updateCartUI(){const count=document.getElementById('cartCount'),itemsDiv=document.getElementById('cartItems'),totalDiv=document.getElementById('cartTotal');if(!count||!itemsDiv||!totalDiv)return;count.textContent=cart.reduce((sum,item)=>sum+item.quantity,0);if(cart.length===0){itemsDiv.innerHTML='<p style="color:#dbe8fa;">Your cart is empty.</p>';totalDiv.textContent='Estimated Total: $0.00';return;}let total=0;itemsDiv.innerHTML=cart.map((item,index)=>{const lineTotal=item.price*item.quantity;total+=lineTotal;return `<div class="cart-item"><div><strong>${item.name}</strong><br><span>${item.priceText} each</span></div><div class="cart-qty"><button type="button" onclick="changeCartQuantity(${index},-1)">â</button><span>${item.quantity}</span><button type="button" onclick="changeCartQuantity(${index},1)">+</button></div><div>$${lineTotal.toFixed(2)}</div><button class="cart-remove" type="button" onclick="removeCartItem(${index})">Remove</button></div>`;}).join('');totalDiv.textContent=`Estimated Total: $${total.toFixed(2)}`;}
function changeCartQuantity(index,amount){if(!cart[index])return;cart[index].quantity+=amount;if(cart[index].quantity<=0)cart.splice(index,1);updateCartUI();renderCartCheckoutIfOpen();}
function removeCartItem(index){cart.splice(index,1);updateCartUI();renderCartCheckoutIfOpen();}
function openCart(){updateCartUI();document.getElementById('cartModal').style.display='flex';}
function closeCart(){document.getElementById('cartModal').style.display='none';}
function cartSummaryText(){if(cart.length===0)return '';const lines=cart.map(item=>`${item.name} | Qty: ${item.quantity} | Unit: ${item.priceText} | Line Total: $${(item.price*item.quantity).toFixed(2)}`);const total=cart.reduce((sum,item)=>sum+item.price*item.quantity,0);lines.push(`Estimated Total: $${total.toFixed(2)}`);return lines.join('\n');}
function showCartCheckout(){renderCartCheckout();}
function renderCartCheckoutIfOpen(){const checkout=document.getElementById('cartCheckout');if(checkout&&checkout.innerHTML.trim())renderCartCheckout();}
function renderCartCheckout(){const checkout=document.getElementById('cartCheckout');if(!checkout)return;if(cart.length===0){checkout.innerHTML='<div class="modal-panel"><h3>Order Request</h3><p style="color:#dbe8fa;">Add at least one product before submitting an order request.</p></div>';return;}const summary=cartSummaryText().replace(/"/g,'&quot;');checkout.innerHTML=`<div class="modal-panel"><h3>Order Request</h3><form action="https://formsubmit.co/orders@covenantbiolabs.com" method="POST"><input type="hidden" name="_subject" value="New Covenant Bio Labs Order Inquiry"><input type="hidden" name="_template" value="table"><input type="hidden" name="Order Summary" value="${summary}"><textarea class="field" name="Products Requested" readonly>${cartSummaryText()}</textarea><input class="field" name="First Name" placeholder="First Name" required><input class="field" name="Last Name" placeholder="Last Name" required><input class="field" name="Email" type="email" placeholder="Email Address" required><input class="field" name="Phone Number" placeholder="Phone Number" required><textarea class="field" name="Shipping Address" placeholder="Shipping Address" required></textarea><button class="order-submit" type="submit">Submit Order Request</button></form></div>`;}
document.getElementById('productModal').addEventListener('click',e=>{if(e.target.id==='productModal')closeModal();});
document.getElementById('coaZoomModal').addEventListener('click',e=>{if(e.target.id==='coaZoomModal')closeCOAZoom();});
document.getElementById('cartModal').addEventListener('click',e=>{if(e.target.id==='cartModal')closeCart();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCOAZoom();closeCart();closeModal();}});
const zoomWrap=document.getElementById('zoomWrap'),zoomedImage=document.getElementById('zoomedCOAImage');
zoomWrap.addEventListener('wheel',e=>{if(document.getElementById('coaZoomModal').style.display!=='flex')return;e.preventDefault();e.deltaY<0?zoomInCOA():zoomOutCOA();},{passive:false});
let isDragging=false,startX=0,startY=0,scrollLeft=0,scrollTop=0;
zoomedImage.addEventListener('mousedown',e=>{if(currentZoom<=1)return;isDragging=true;zoomedImage.classList.add('dragging');startX=e.pageX-zoomWrap.offsetLeft;startY=e.pageY-zoomWrap.offsetTop;scrollLeft=zoomWrap.scrollLeft;scrollTop=zoomWrap.scrollTop;});
zoomedImage.addEventListener('mouseleave',()=>{isDragging=false;zoomedImage.classList.remove('dragging');});
zoomedImage.addEventListener('mouseup',()=>{isDragging=false;zoomedImage.classList.remove('dragging');});
zoomedImage.addEventListener('mousemove',e=>{if(!isDragging)return;e.preventDefault();const x=e.pageX-zoomWrap.offsetLeft,y=e.pageY-zoomWrap.offsetTop;zoomWrap.scrollLeft=scrollLeft-(x-startX)*1.2;zoomWrap.scrollTop=scrollTop-(y-startY)*1.2;});
function makeMolecule(top,left,scale,duration,delay){return `<div class="molecule" style="top:${top}%; left:${left}%; transform:scale(${scale}); animation-duration:${duration}s; animation-delay:${delay}s;"><div class="node" style="left:0px; top:0px;"></div><div class="node" style="left:42px; top:16px;"></div><div class="node" style="left:82px; top:-6px;"></div><div class="node" style="left:112px; top:26px;"></div><div class="bond" style="left:5px; top:5px; width:42px; transform:rotate(20deg);"></div><div class="bond" style="left:47px; top:20px; width:45px; transform:rotate(-28deg);"></div><div class="bond" style="left:87px; top:0px; width:40px; transform:rotate(42deg);"></div></div>`;}
document.getElementById('moleculeBg').innerHTML=makeMolecule(6,4,1.15,22,0)+makeMolecule(12,80,1.35,28,-3)+makeMolecule(24,56,.90,20,-6)+makeMolecule(38,12,1,24,-2)+makeMolecule(52,84,1.22,26,-8)+makeMolecule(68,8,.92,19,-4)+makeMolecule(74,52,1.05,22,-5)+makeMolecule(84,88,.82,17,-7);
updateCartUI();
</script>
