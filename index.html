<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Covenant Bio Labs</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#03060b;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#0b1420;
  padding:20px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
}

.price{color:#65df87;font-weight:bold}

/* 🔥 FIXED MODAL */
#productModal{
  display:none;
  position:fixed;
  inset:0;
  z-index:9999;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);
  align-items:center;
  justify-content:center;
}

.modal-box{
  width:90%;
  max-width:900px;
  background:#06101a;
  padding:30px;
  border-radius:20px;
  box-shadow:0 30px 80px rgba(0,0,0,.8);
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="grid" id="productGrid"></div>

<div id="productModal"></div>

<script>

/* PRODUCTS */
const products=[
{name:"Retatrutide 20mg",price:"$120"},
{name:"Cagrilintide 5mg",price:"$70"},
{name:"IGF-1 LR3 1mg",price:"$75"},
{name:"NAD+ 500mg",price:"$60"}
];

let cart=[];
let currentProduct=null;

/* GRID */
const grid=document.getElementById('productGrid');

products.forEach(p=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <h3>${p.name}</h3>
    <p class="price">${p.price}</p>
    <button>View</button>
  `;
  card.onclick=()=>openProduct(p.name);
  grid.appendChild(card);
});

/* 🔥 MODAL FIX */
function openProduct(name){
  const p=products.find(x=>x.name===name);
  currentProduct=p;

  const modal=document.getElementById('productModal');

  modal.innerHTML=`
    <div class="modal-box">
      <div class="close" onclick="closeModal()">X</div>
      <h2>${p.name}</h2>
      <p>${p.price}</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>
  `;

  document.body.appendChild(modal);
  modal.style.display='flex';
}

/* CLOSE */
function closeModal(){
  document.getElementById('productModal').style.display='none';
}

/* CART */
function addToCart(){
  cart.push(currentProduct);
  alert("Added to cart");
}

/* CLICK OUTSIDE */
document.getElementById('productModal').addEventListener('click',e=>{
  if(e.target.id==='productModal')closeModal();
});

</script>

</body>
</html>
