<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Covenant Bio Labs</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#03060b;
  color:white;
}

/* HERO */
.hero{
  height:60vh;
  background:url('hero-new.jpg') center/cover no-repeat;
  border-bottom:1px solid rgba(255,255,255,.1);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:30px;
  max-width:1400px;
  margin:auto;
}

/* CARD */
.card{
  background:#0a111c;
  border-radius:18px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px);
}

/* IMAGE */
.product-thumb{
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.product-thumb img{
  max-height:160px;
}

/* VERIFIED BADGE */
.verified{
  position:absolute;
  top:10px;
  right:10px;
  font-size:11px;
  padding:6px 10px;
  border-radius:20px;
  font-weight:bold;
  background:linear-gradient(135deg,#fff3a6,#6cff9c,#5bd3ff);
  color:#000;
}

/* TEXT */
h3{font-size:18px;margin:10px 0}
.price{color:#6cff9c;font-weight:bold}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#5bd3ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#0a111c;
  padding:30px;
  border-radius:20px;
  max-width:600px;
  width:90%;
}

.close{
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="grid" id="grid"></div>

<div id="modal"></div>

<script>
const products = [
  {name:"Retatrutide 20mg",price:"$120",img:"retatrutide-20mg.jpg"},
  {name:"Cagrilintide 5mg",price:"$70",img:"cagrilintide-5mg.jpg"},
  {name:"IGF-1 LR3 1mg",price:"$75",img:"igf1-lr3-1mg.jpg"},
  {name:"Tesamorelin 5mg",price:"$40",img:"tesamorelin-5mg.jpg"},
  {name:"NAD+ 500mg",price:"$60",img:"nad-500mg.jpg"},
  {name:"MOTS-C 10mg",price:"$50",img:"mots-c-10mg.jpg"},
  {name:"SS-31 10mg",price:"$40",img:"ss-31-10mg.jpg"},
  {name:"HGH Somatropin 12iu",price:"$55",img:"hgh-somatropin-12iu.jpg"},
  {name:"MT-2 10mg",price:"$50",img:"mt-2-10mg.jpg"},
  {name:"Glutathione 1500mg",price:"$50",img:"glutathione-1500mg.jpg"},
  {name:"Epithalon 10mg",price:"$50",img:"epithalon-10mg.jpg"},
  {name:"KPV 10mg",price:"$50",img:"kpv-10mg.jpg"},
  {name:"5 Amino Q 5mg",price:"$50",img:"5-amino-q-5mg.jpg"},
  {name:"Semax 10mg",price:"$50",img:"semax-10mg.jpg"},
  {name:"Selank 10mg",price:"$50",img:"selank-10mg.jpg"},
  {name:"CJC + IPA",price:"$50",img:"cjc-ipa-5mg.jpg"},
  {name:"WOLVERINE",price:"$50",img:"wolverine.jpg"},
  {name:"GLOW",price:"$100",img:"glow.jpg"},
  {name:"KLOW",price:"$120",img:"klow.jpg"}
];

const grid=document.getElementById('grid');

products.forEach(p=>{
  const div=document.createElement('div');
  div.className='card';

  div.innerHTML=`
    <div class="product-thumb">
      <div class="verified">LAB VERIFIED</div>
      <img src="${p.img}">
    </div>
    <h3>${p.name}</h3>
    <div class="price">${p.price}</div>
    <button onclick="openModal('${p.name}','${p.price}','${p.img}')">View</button>
  `;

  grid.appendChild(div);
});

function openModal(name,price,img){
  const modal=document.getElementById('modal');
  modal.style.display='flex';

  modal.innerHTML=`
    <div class="modal-box">
      <div class="close" onclick="closeModal()">✕</div>
      <h2>${name}</h2>
      <img src="${img}" style="max-width:200px">
      <p>${price}</p>
      <p>Lab Verified • COA Available / Pending</p>
    </div>
  `;
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
